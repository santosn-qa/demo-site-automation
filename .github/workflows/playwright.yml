name: Playwright Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        id: node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache node_modules
        # Caches installed dependencies between runs to speed up CI.
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ steps.node.outputs.node-version }}-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ steps.node.outputs.node-version }}-modules-
            ${{ runner.os }}-node-

      - name: Install dependencies
        # npm ci is preferred in CI for clean, reproducible installs.
        # --ignore-scripts avoids running postinstall; Playwright browsers are installed explicitly below.
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (headless)
        # Headless is Playwright's default; we don't pass --headed.
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
